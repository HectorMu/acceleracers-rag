services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      retries: 5
    entrypoint: >
      sh -c "
      ollama serve &
      sleep 3 &&
      ollama pull llama3.1:8b &&
      ollama pull nomic-embed-text &&
      wait
      "

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - PORT=3000
    volumes:
      - ./data:/app/data
    depends_on:
      ollami:
        condition: service_healthy

volumes:
  ollama_data:
